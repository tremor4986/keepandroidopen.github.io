# Hero
hero_lede: "당신의 스마트폰이 당신의 손에서 벗어나려 합니다."
hero_countdown_label: "폐쇄까지 남은 일수"
hero_sub: >-
  2026년 9월부터 Google이 강제로 시행하는 자동 업데이트를 통해, 개발자가 Google에 등록하지 않고 계약에 서명하거나 비용을 지불하지 않은 <strong>모든 Android 앱이 차단</strong>될 예정입니다.
hero_kicker: "전 세계 모든 앱과 모든 기기에 적용되며, 거부권은 없습니다."

# What Google is doing
what_heading: "Google이 하려는 일"
what_intro: "2025년 8월, Google은 새로운 요구사항을 <a href=\"https://developer.android.com/developer-verification\" target=\"_blank\">발표했습니다 &#8599;</a>. 2026년 9월부터 <strong>모든 Android 앱은...</strong>"
what_registration: "등록에 필요한 사항:"
what_req_fee: "Google에 수수료 지불"
what_req_terms: "Google 서비스 약관 동의"
what_req_id: "정부 발행 신분증 제출"
what_req_signing: "개인 서명 키 소유 증명"
what_req_appids: "현재 및 향후 모든 애플리케이션 식별자 목록 제출"
what_pullquote: "개발자가 이를 따르지 않을 경우, 해당 앱은 전 세계 모든 Android 기기에서 소리 없이 차단됩니다."

# Who this hurts
impact_heading: "피해를 입는 사람들"
impact_you_heading: "사용자"
impact_you_p1: "당신은 Android가 개방형 플랫폼이라는 Google의 말을 믿고 기기를 구매했습니다. 원하는 앱을 직접 설치할 수 있다는 것이 그 계약 조건이었습니다."
impact_you_p2: "이제 Google은 이미 소유하고 있는 하드웨어에 대해 소급 적용하여 그 계약을 수정하려 합니다. 업데이트 이후에는 Google이 사전 승인한 소프트웨어만 실행할 수 있습니다. <i>당신</i>의 자산인 스마트폰에서 말입니다."
impact_dev_heading: "인디 개발자"
impact_dev_p1: "10대 소년이 처음 만든 앱, 자원봉사자의 개인정보 보호 도구, 기업의 기밀 내부 베타 버전 등 무엇이든 상관없습니다. 2026년 9월 이후에는 Google의 축복 없이는 그 어떤 것도 설치할 수 없습니다."
impact_dev_p2: "수천 개의 자유 소프트웨어 및 오픈 소스 Android 앱의 본거지인 <a href=\"https://f-droid.org\" target=\"_blank\">F-Droid &#8599;</a>는 이를 <a href=\"https://f-droid.org/en/2025/09/29/google-developer-verification.html\" target=\"_blank\">존립에 대한 위협</a>이라고 정의했습니다."
impact_gov_heading: "정부 및 시민 사회"
impact_gov_p1: "Google은 권위주의 정권이 앱 삭제를 요구할 때 이에 순응해 온 <a href=\"https://www.aclu.org/news/free-speech/app-store-oligopoly\" target=\"_blank\">기록 &#8599;</a>이 있습니다."
impact_gov_p2: "<a href=\"https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship\" target=\"_blank\">EFF &#8599;</a>는 이러한 앱 게이트키핑을 \"끊임없이 확장되는 인터넷 검열의 경로\"라고 부릅니다."

# Advanced flow
flow_heading: "Google의 '비상구'는 함정입니다"
flow_intro: "Google은 '파워 유저'가 미인증 앱을 <a href=\"https://android-developers.googleblog.com/2026/03/android-developer-verification.html\" target=\"_blank\">\"여전히 설치\"</a>할 수 있다고 말합니다. 하지만 그 과정은 이렇습니다."
flow_step1: "시스템 설정 깊숙이 들어가 '개발자 옵션'을 찾습니다."
flow_step2: "빌드 번호를 <strong>일곱 번</strong> 탭하여 개발자 모드를 활성화합니다."
flow_step3: "강압적 활성화에 대한 경고 화면을 무시합니다."
flow_step4: "PIN 번호를 입력합니다."
flow_step5: "기기를 재부팅합니다."
flow_step6: "<strong>24시간 동안 기다립니다.</strong>"
flow_step7: "다시 돌아와 더 많은 경고 화면을 무시합니다."
flow_step8: "'일시적 허용'(7일) 또는 '무기한 허용'을 선택합니다."
flow_step9: "'위험'을 이해했다는 사실을 다시 한번 확인합니다."
flow_summary: "9단계의 절차, 강제적인 24시간의 대기 기간이 있습니다. <em>본인 소유의 기기에 소프트웨어를 설치하는 데 필요한 절차입니다.</em>"
flow_detail: "더 심각한 점은, 이 과정이 Android OS가 아닌 <strong>Google Play 서비스</strong>를 통해 실행된다는 것입니다. Google은 OS 업데이트 없이도 사용자 동의 없이 언제든 이 과정을 변경, 강화 또는 삭제할 수 있습니다."

# Precedent
precedent_heading: "Android만의 문제가 아닙니다"
precedent_pullquote: "Google이 개방형 플랫폼으로 판매된 수십억 대의 기기를 소급하여 폐쇄할 수 있다면, 지구상의 모든 하드웨어 제조사가 이를 지켜보게 될 것입니다."
precedent_p1: "확립되고 있는 원칙은 이렇습니다. <strong>'당신이 기기를 구매한 후에도 당신이 실행할 수 있는 소프트웨어를 제조사가 제한할 수 있다'</strong>는 것입니다. 소프트웨어 업계에서는 이를 '러그 풀(Rug pull)'이라고 부릅니다."
precedent_p2: "Android의 개방성은 단순한 기능이 아니라, iPhone과 차별화되는 <em>약속</em>이었습니다. 수백만 명이 바로 그 이유로 Android를 선택했습니다. Google은 이제 그 약속을 일방적으로 파기하려 합니다."
precedent_arstechnica: "<a href=\"https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/\" target=\"_blank\">Ars Technica &#8599;</a>: <em>\"Google의 Apple 따라하기가 Android의 개방적 유산을 해체하려 한다\"</em>"

# Objections
objections_heading: "잠시만요, 이건..."
obj_security_q: "\"...결국 보안을 위한 것 아닌가요?\""
obj_security_a: "보안 명분은 연막에 불과합니다. Google Play Protect는 개발자 신원과 관계없이 이미 악성코드를 검사하고 있습니다. 정부 ID 제출이 코드를 더 안전하게 만들지는 않습니다. 대신 <em>개발자</em>를 추적 가능하게 만들 뿐입니다."
obj_sideloading_q: "\"...고급 설정을 쓰면 여전히 사이드로딩이 가능하지 않나요?\""
obj_sideloading_a: "9단계의 절차, 24시간의 대기 시간, 개발자 옵션 깊숙이 숨겨진 설정, 그리고 Google이 원할 때 취소할 수 있는 독점 서비스를 통하는 것은 사이드로딩이 아닙니다. 그것은 <strong>억제 장치</strong>입니다."
obj_hide_q: "\"...숨길 게 있는 사람들에게만 문제 아닌가요?\""
obj_hide_a: "권위주의 정부 하의 내부 고발자, 저널리스트, 활동가들이 첫 번째 희생자가 될 것입니다. 가정 폭력 상황에 처한 사람들도 마찬가지입니다. 이들은 모두 Google과 정부의 신원 확인을 불신할 정당한 이유가 있습니다."
obj_apple_q: "\"...Apple도 똑같이 하고 있지 않나요?\""
obj_apple_a: "Apple은 처음부터 폐쇄적인 환경이었습니다. 사람들은 Android가 <em>다르기 때문에</em> 선택했습니다. \"Apple도 하니까\"라는 말은 하향 평준화를 정당화하는 논리일 뿐입니다."
obj_cost_q: "\"...겨우 25달러와 서류 몇 장 아닌가요?\""
obj_cost_a: "신용카드와 운전면허증이 있는 미국 개발자에게는 그럴지도 모릅니다. 하지만 사하라 이남 아프리카의 학생이나, 미얀마의 반체제 인사, 또는 지역 사회 보건 도구를 관리하는 자원봉사자에게는 불가능한 장벽이 될 수 있습니다."

# Fight back
act_heading: "함께 싸워주세요"
act_everyone_heading: "모두를 위한 행동"
act_fdroid: "소유한 모든 Android 기기에 <strong><a href=\"https://f-droid.org\" target=\"_blank\">F-Droid를 설치 &#8599;</a>해 주세요.</strong> 대안 앱 스토어는 사람들이 실제로 사용해야만 살아남을 수 있습니다."
act_regulators: "<strong><a href=\"/cta/#consumers\">규제 당국에 연락해 주세요.</a></strong> 전 세계 규제 기관은 빅테크의 권력 집중을 우려하고 있으며 사용자의 목소리를 듣고 싶어 합니다."
act_share: "<strong>이 페이지를 공유해 주세요.</strong> <a href=\"https://keepandroidopen.org\">keepandroidopen.org</a> 링크를 널리 퍼뜨려 주세요."
act_astroturf: "<strong>여론 조작에 맞서세요.</strong> Google의 논리를 대변하는 이들이 늘어나고 있습니다. 그들이 담론을 장악하게 두지 마세요."
act_petition: "<strong><a href=\"https://www.change.org/p/stop-google-from-limiting-apk-file-usage/\" target=\"_blank\">change.org 청원에 서명해 주세요. &#8599;</a></strong> 이미 10만 명 이상이 동참했습니다."
act_letter: "<strong><a href=\"/open-letter\">공개 서한을 읽고 공유해 주세요.</a></strong>"
act_survey: "Google의 <a href=\"https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1\" target=\"_blank\">공식 피드백 양식</a>을 통해 의견을 전달하세요."
act_dev_heading: "개발자를 위한 행동"
act_dev_intro: "<strong style=\"text-transform: uppercase;\">등록하지 마세요.</strong> Android 개발자 콘솔에 가입하거나 철회 불가능한 약관에 동의하지 마세요."
act_dev_resist: "Google의 계획은 개발자들이 따를 때만 성공합니다. 거부해 주세요."
act_dev_talk: "다른 개발자와 단체들이 등록하지 않도록 설득해 주세요."
act_dev_warn: "앱에 <a href=\"https://github.com/woheller69/FreeDroidWarn\" target=\"_blank\">FreeDroidWarn 라이브러리 &#8599;</a>를 추가하여 사용자에게 경고해 주세요."
act_dev_banner: "웹사이트를 운영하시나요? <a href=\"/banner\">카운트다운 배너를 추가해 주세요.</a>"
act_google_heading: "Google 직원들에게"
act_google_text: "이 프로그램의 기술적 구현이나 내부적인 부분에 대해 알고 계신다면, <em>비업무용</em> 장치 및 <em>Gmail이 아닌</em> 계정으로 <a href=\"mailto:tips@keepandroidopen.org\">tips@keepandroidopen.org</a>에 제보해 주세요. 모든 정보는 철저히 비밀로 유지됩니다."

