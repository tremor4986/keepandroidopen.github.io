# Social share messages (rotated randomly; {url} is replaced at build time)
social_callout_x_1: "2026년 9월부터 구글은 개발자가 등록을 마치고 정부 발행 신분증을 제공하지 않은 모든 안드로이드 앱을 차단할 예정입니다. 이는 전 세계 모든 안드로이드 기기에 영향을 미칩니다. {url} 에서 자세히 알아보세요. @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "구글은 모든 안드로이드 앱 개발자가 중앙 시스템에 등록하고, 수수료를 지불하며, 신분증을 제출해야 한다고 발표했습니다. 그렇지 않으면 모든 기기에서 앱이 차단됩니다. 67개 이상의 단체가 이에 반대하고 있습니다. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_3: "안드로이드의 개방성은 17년 동안 아이폰과 차별화되는 점이었습니다. 이제 구글은 플레이 스토어 외부에서 배포되는 앱을 포함한 모든 앱에 대해 의무적인 개발자 등록을 요구하고 있습니다. {url} #KeepAndroidOpen"
